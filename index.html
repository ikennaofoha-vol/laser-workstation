<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Workstation - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: sans-serif; }
        input[type=range] { accent-color: #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUnrzvMhU6r6vfNDCibs9_Cdhu1Y8vV7EBwfk8gdzQJi_xJWYVYdARlTQZD1JYHkt3qg/exec";

        const { useState, useEffect, useMemo } = React;
        const { Zap, Target, Layers, Save, Activity, Database, CheckCircle, AlertTriangle, Loader2, ChevronDown, MoveHorizontal, Scissors } = lucide;

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [ui, setUi] = useState({});
            const [library, setLibrary] = useState({ conductive: [], substrate: [], laserSources: [] });
            
            const [params, setParams] = useState({
                name: "New Test Run",
                wavelength: 532,
                avgPower: 5.0,
                freq: 40000,
                pulseWidth: 15,
                spotSize: 15,
                speed: 500,
                thickness: 0.5 // Material Thickness in mm
            });

            const [s1Material, setS1Material] = useState(null);
            const [s2Material, setS2Material] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL);
                        const data = await response.json();
                        setUi(data.uiConfig);
                        const conductive = data.materials.filter(m => m.category === 'Conductive');
                        const substrate = data.materials.filter(m => m.category === 'Substrate');
                        setLibrary({ conductive, substrate, laserSources: data.laserSources });
                        setS1Material(conductive[0]);
                        setS2Material(substrate[0]);
                        setLoading(false);
                    } catch (err) { console.error("Sheet Sync Failed", err); }
                };
                init();
            }, []);

            const results = useMemo(() => {
                if (!s1Material || !s2Material) return null;
                
                // Intensity Calculation
                const pulseEnergy = params.avgPower / params.freq;
                const peakPower = pulseEnergy / (params.pulseWidth * 1e-9);
                const area = Math.PI * Math.pow((params.spotSize / 10000) / 2, 2);
                const rawIntensity = (peakPower / area) / 1e9;

                // Wavelength Selection
                const getAbs = (mat) => {
                    if (params.wavelength <= 400) return mat.abs[355];
                    if (params.wavelength <= 650) return mat.abs[532];
                    return mat.abs[1064];
                };

                const s1Eff = rawIntensity * getAbs(s1Material);
                const s2Eff = rawIntensity * getAbs(s2Material);

                // Pass Estimation Logic
                // Total distance to ablate = thickness (mm) * 1000 (um)
                const s2Passes = s2Eff >= s2Material.threshold 
                    ? Math.ceil((params.thickness * 1000) / s2Material.depth) 
                    : Infinity;

                // Process Overlap
                const overlap = (1 - ((params.speed / params.freq) / (params.spotSize / 1000))) * 100;

                return {
                    peakPower: (peakPower / 1000).toFixed(2),
                    rawIntensity: rawIntensity.toFixed(3),
                    s1Intensity: s1Eff.toFixed(3),
                    s2Intensity: s2Eff.toFixed(3),
                    s1Pass: s1Eff >= s1Material.threshold,
                    s2Pass: s2Eff >= s2Material.threshold,
                    s2Passes,
                    overlap: overlap.toFixed(1)
                };
            }, [params, s1Material, s2Material]);

            const handleSave = async () => {
                setIsSaving(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            ...params,
                            s1Material: s1Material.name,
                            s1Intensity: results.s1Intensity,
                            s2Material: s2Material.name,
                            s2Intensity: results.s2Intensity,
                            passes: results.s2Passes === Infinity ? "FAIL" : results.s2Passes,
                            mode: "Advanced_Workstation"
                        })
                    });
                    alert("Analysis saved to Google Sheet!");
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-emerald-500 font-mono text-xs tracking-widest animate-pulse">BOOTING PHYSICS CORE...</div>;

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[#050505]">
                    <div className="max-w-7xl mx-auto">
                        
                        <header className="flex justify-between items-center mb-10 pb-6 border-b border-white/10">
                            <div>
                                <h1 className="text-3xl font-black text-white tracking-tight">{ui.main_title || 'LASER WORKSTATION'}</h1>
                                <div className="flex items-center gap-4 mt-1">
                                    <span className="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded font-bold uppercase tracking-wider border border-emerald-500/20">Active Engine</span>
                                    <p className="text-neutral-500 text-[10px] uppercase font-bold tracking-widest">{ui.main_subhead}</p>
                                </div>
                            </div>
                            <div className="hidden md:flex gap-2">
                                <button className="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                                    <Database size={18} className="text-emerald-500" />
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            
                            {/* INPUTS COLUMN */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-[#0f0f0f] border border-white/5 rounded-3xl p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.2em]">Laser Hardware</h2>
                                        <select 
                                            onChange={(e) => {
                                                const s = library.laserSources.find(x => x.name === e.target.value);
                                                if(s) setParams({...params, ...s, name: s.name});
                                            }}
                                            className="bg-emerald-600 text-white text-[10px] font-black px-3 py-1.5 rounded-full outline-none hover:bg-emerald-500 transition-colors"
                                        >
                                            <option value="">PRESETS</option>
                                            {library.laserSources.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-5">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-bold text-neutral-500 uppercase ml-1">Avg Power (W)</label>
                                            <input type="number" step="0.1" value={params.avgPower} onChange={e => setParams({...params, avgPower: parseFloat(e.target.value)})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-sm font-bold focus:border-emerald-500 outline-none transition-all" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-bold text-neutral-500 uppercase ml-1">Wavelength</label>
                                                <input type="number" value={params.wavelength} onChange={e => setParams({...params, wavelength: parseInt(e.target.value)})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-sm font-bold outline-none" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-bold text-neutral-500 uppercase ml-1">Freq (Hz)</label>
                                                <input type="number" value={params.freq} onChange={e => setParams({...params, freq: parseInt(e.target.value)})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-sm font-bold outline-none" />
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-bold text-neutral-500 uppercase ml-1">Spot Size (µm)</label>
                                            <input type="number" value={params.spotSize} onChange={e => setParams({...params, spotSize: parseFloat(e.target.value)})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-sm font-bold outline-none" />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#0f0f0f] border border-white/5 rounded-3xl p-6 shadow-2xl">
                                    <h2 className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.2em] mb-8">Process Variables</h2>
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <div className="flex justify-between">
                                                <label className="text-[10px] font-bold text-neutral-500 uppercase">Galvo Speed</label>
                                                <span className="text-xs font-bold text-emerald-500">{params.speed} mm/s</span>
                                            </div>
                                            <input type="range" min="10" max="5000" step="10" value={params.speed} onChange={e => setParams({...params, speed: parseInt(e.target.value)})} className="w-full" />
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between">
                                                <label className="text-[10px] font-bold text-neutral-500 uppercase">Material Thickness</label>
                                                <span className="text-xs font-bold text-cyan-500">{params.thickness} mm</span>
                                            </div>
                                            <input type="range" min="0.01" max="5" step="0.01" value={params.thickness} onChange={e => setParams({...params, thickness: parseFloat(e.target.value)})} className="w-full" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* OUTPUTS COLUMN */}
                            <div className="lg:col-span-8 space-y-8">
                                
                                {/* Intensity Hero */}
                                <div className="bg-neutral-900 border border-white/5 rounded-[2rem] p-10 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-10 opacity-10 group-hover:scale-110 transition-transform duration-700">
                                        <Zap size={200} />
                                    </div>
                                    <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2">Effective Ablation Intensity</p>
                                    <div className="flex items-baseline gap-4 mb-8">
                                        <span className="text-9xl font-black text-white tracking-tighter tabular-nums">{results?.rawIntensity}</span>
                                        <span className="text-2xl font-bold text-neutral-700 italic">GW/cm²</span>
                                    </div>
                                    <div className="flex gap-10 border-t border-white/5 pt-8">
                                        <div>
                                            <p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Pulse Energy</p>
                                            <p className="text-xl font-black text-white">{(params.avgPower/params.freq*1000000).toFixed(1)} µJ</p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Peak Power</p>
                                            <p className="text-xl font-black text-white">{results?.peakPower} kW</p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Pulse Overlap</p>
                                            <p className={`text-xl font-black ${results?.overlap < 20 || results?.overlap > 90 ? 'text-orange-500' : 'text-emerald-500'}`}>{results?.overlap}%</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {/* Stage 1 Result */}
                                    <div className={`p-8 rounded-[2rem] border-2 transition-all ${results?.s1Pass ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="p-3 bg-white/5 rounded-2xl"><Target className="text-emerald-500" /></div>
                                            {results?.s1Pass ? <CheckCircle className="text-emerald-500" /> : <AlertTriangle className="text-red-500" />}
                                        </div>
                                        <h3 className="text-xs font-black text-neutral-400 uppercase tracking-widest mb-4">Stage 1: Conductive</h3>
                                        <select value={s1Material?.name} onChange={e => setS1Material(library.conductive.find(m => m.name === e.target.value))} className="bg-transparent text-lg font-black text-white outline-none w-full mb-2">
                                            {library.conductive.map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                        </select>
                                        <p className={`text-2xl font-black ${results?.s1Pass ? 'text-emerald-400' : 'text-red-400'}`}>{results?.s1Intensity} <span className="text-sm font-normal text-neutral-600 italic">GW/cm²</span></p>
                                    </div>

                                    {/* Stage 2 Result (The Deep Cut) */}
                                    <div className={`p-8 rounded-[2rem] border-2 transition-all ${results?.s2Pass ? 'bg-cyan-500/5 border-cyan-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="p-3 bg-white/5 rounded-2xl"><Scissors className="text-cyan-500" /></div>
                                            {results?.s2Pass ? <CheckCircle className="text-cyan-500" /> : <AlertTriangle className="text-red-500" />}
                                        </div>
                                        <h3 className="text-xs font-black text-neutral-400 uppercase tracking-widest mb-4">Stage 2: Substrate</h3>
                                        <select value={s2Material?.name} onChange={e => setS2Material(library.substrate.find(m => m.name === e.target.value))} className="bg-transparent text-lg font-black text-white outline-none w-full mb-2">
                                            {library.substrate.map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                        </select>
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-[10px] text-neutral-500 font-bold mb-1">ESTIMATED PASSES</p>
                                                <p className={`text-3xl font-black ${results?.s2Pass ? 'text-cyan-400' : 'text-red-400'}`}>{results?.s2Passes === Infinity ? 'FAIL' : results?.s2Passes}</p>
                                            </div>
                                            <p className="text-[10px] font-mono text-neutral-600 mb-1">Depth: {s2Material?.depth}µm/pass</p>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleSave} 
                                    disabled={isSaving}
                                    className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-neutral-800 py-6 rounded-[2rem] text-white font-black text-xs uppercase tracking-[0.4em] shadow-2xl active:scale-[0.98] transition-all"
                                >
                                    {isSaving ? <Activity className="animate-spin inline mr-2" /> : <Save className="inline mr-2" />}
                                    {isSaving ? "Archiving Analysis..." : ui.btn_save || 'SYNC TO CLAD_LOGS'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
