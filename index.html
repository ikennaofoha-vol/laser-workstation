<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser4You Workstation</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX processing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0a0a; color: #d1d5db; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        // 1. PASTE YOUR GOOGLE SCRIPT URL HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBebhH0qc7BjWrRzZ_i1PZZONxLm-6Yw_qrkDnQH7aN3FxTkMBE72GCDnFflVUtIeINQ/exec";

        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('simulator');
            const [mode, setMode] = useState('both');
            const [isSaving, setIsSaving] = useState(false);
            const [ui, setUi] = useState({});
            const [library, setLibrary] = useState({ conductive: [], substrate: [], laserSources: [] });
            const [params, setParams] = useState({
                name: "New Test Run",
                wavelength: 532,
                avgPower: 5.0,
                freq: 40000,
                pulseWidth: 15,
                spotSize: 15
            });

            const [s1Material, setS1Material] = useState(null);
            const [s2Material, setS2Material] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL);
                        const data = await response.json();
                        setUi(data.uiConfig);
                        const conductive = data.materials.filter(m => m.category === 'Conductive');
                        const substrate = data.materials.filter(m => m.category === 'Substrate');
                        setLibrary({ conductive, substrate, laserSources: data.laserSources });
                        setS1Material(conductive[0]);
                        setS2Material(substrate[0]);
                        setLoading(false);
                    } catch (err) {
                        console.error("Fetch Error:", err);
                    }
                };
                if (GOOGLE_SCRIPT_URL.startsWith("http")) init();
            }, []);

            const results = useMemo(() => {
                if (!s1Material || !s2Material) return null;
                const pulseEnergy = params.avgPower / params.freq;
                const peakPower = pulseEnergy / (params.pulseWidth * 1e-9);
                const area = Math.PI * Math.pow((params.spotSize / 10000) / 2, 2);
                const rawIntensity = (peakPower / area) / 1e9;
                const getAbs = (mat) => {
                    if (params.wavelength <= 400) return mat.abs[355];
                    if (params.wavelength <= 650) return mat.abs[532];
                    return mat.abs[1064];
                };
                const s1Eff = rawIntensity * getAbs(s1Material);
                const s2Eff = rawIntensity * getAbs(s2Material);
                return {
                    peakPower: (peakPower / 1000).toFixed(2),
                    rawIntensity: rawIntensity.toFixed(3),
                    s1Intensity: s1Eff.toFixed(3),
                    s2Intensity: s2Eff.toFixed(3),
                    s1Pass: s1Eff >= s1Material.threshold,
                    s2Pass: s2Eff >= s2Material.threshold
                };
            }, [params, s1Material, s2Material]);

            const handleLoadPreset = (e) => {
                const source = library.laserSources.find(s => s.name === e.target.value);
                if (source) {
                    setParams({
                        name: source.name,
                        wavelength: source.wavelength,
                        avgPower: source.avgPower,
                        freq: source.freq,
                        pulseWidth: source.pulseWidth,
                        spotSize: source.spotSize
                    });
                }
            };

            const handleSave = async () => {
                setIsSaving(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            ...params,
                            s1Material: s1Material.name,
                            s1Intensity: results.s1Intensity,
                            s2Material: s2Material.name,
                            s2Intensity: results.s2Intensity,
                            mode
                        })
                    });
                    alert("Test Data Logged to Google Sheet!");
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-black text-emerald-500 font-mono tracking-widest animate-pulse">
                    SYNCING WITH GOOGLE SHEETS...
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 bg-neutral-950">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-neutral-800 gap-4">
                            <div>
                                <h1 className="text-3xl font-black text-white">{ui.main_title}</h1>
                                <p className="text-neutral-500 text-[10px] tracking-[0.3em] uppercase mt-1">{ui.main_subhead}</p>
                            </div>
                            <div className="bg-neutral-900 rounded-lg p-1 border border-neutral-800">
                                <button className="px-6 py-2 bg-emerald-600 text-white rounded text-xs font-bold shadow-lg">SIMULATOR</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Inputs */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-6 shadow-xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-[10px] font-black text-neutral-500 tracking-widest uppercase">Configuration</h2>
                                        <select onChange={handleLoadPreset} className="bg-emerald-600/10 border border-emerald-500/50 text-emerald-400 text-[10px] font-bold px-2 py-1 rounded outline-none cursor-pointer">
                                            <option value="">PRESETS</option>
                                            {library.laserSources.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                            <label className="block text-[10px] text-neutral-500 mb-1 font-bold">SOURCE NAME</label>
                                            <input type="text" value={params.name} onChange={e => setParams({...params, name: e.target.value})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                                <label className="block text-[10px] text-neutral-500 mb-1 font-bold">WAVE (nm)</label>
                                                <input type="number" value={params.wavelength} onChange={e => setParams({...params, wavelength: parseInt(e.target.value)})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                            </div>
                                            <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                                <label className="block text-[10px] text-neutral-500 mb-1 font-bold">POWER (W)</label>
                                                <input type="number" value={params.avgPower} onChange={e => setParams({...params, avgPower: parseFloat(e.target.value)})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                                <label className="block text-[10px] text-neutral-500 mb-1 font-bold">FREQ (Hz)</label>
                                                <input type="number" value={params.freq} onChange={e => setParams({...params, freq: parseInt(e.target.value)})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                            </div>
                                            <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                                <label className="block text-[10px] text-neutral-500 mb-1 font-bold">PULSE (ns)</label>
                                                <input type="number" value={params.pulseWidth} onChange={e => setParams({...params, pulseWidth: parseFloat(e.target.value)})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                            </div>
                                        </div>
                                        <div className="bg-neutral-800 p-3 rounded-xl border border-neutral-700">
                                            <label className="block text-[10px] text-neutral-500 mb-1 font-bold">SPOT SIZE (µm)</label>
                                            <input type="number" value={params.spotSize} onChange={e => setParams({...params, spotSize: parseFloat(e.target.value)})} className="bg-transparent w-full text-white text-sm font-bold outline-none" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Output */}
                            <div className="lg:col-span-8 space-y-6">
                                <div className="bg-neutral-900 border border-neutral-800 rounded-3xl p-8 shadow-2xl">
                                    <p className="text-[10px] font-black text-neutral-500 tracking-widest uppercase mb-4">{ui.desc_intensity}</p>
                                    <div className="text-8xl font-black text-white tracking-tighter mb-10 tabular-nums">{results?.rawIntensity}</div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-10 border-t border-neutral-800">
                                        <div className={`p-6 rounded-2xl border ${results?.s1Pass ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-red-900/30 bg-red-950/5'}`}>
                                            <h3 className="text-[10px] font-black text-emerald-500 mb-4 tracking-widest uppercase">{ui.s1_header}</h3>
                                            <select value={s1Material?.name} onChange={e => setS1Material(library.conductive.find(m => m.name === e.target.value))} className="bg-transparent text-sm font-bold text-white mb-6 outline-none w-full">
                                                {library.conductive.map(m => <option key={m.name} value={m.name} className="bg-black">{m.name}</option>)}
                                            </select>
                                            <p className={`text-2xl font-black ${results?.s1Pass ? 'text-emerald-500' : 'text-red-500'}`}>{results?.s1Intensity} <span className="text-[10px] text-neutral-600">GW/cm²</span></p>
                                        </div>
                                        <div className={`p-6 rounded-2xl border ${results?.s2Pass ? 'border-cyan-500/30 bg-cyan-500/5' : 'border-red-900/30 bg-red-950/5'}`}>
                                            <h3 className="text-[10px] font-black text-cyan-500 mb-4 tracking-widest uppercase">{ui.s2_header}</h3>
                                            <select value={s2Material?.name} onChange={e => setS2Material(library.substrate.find(m => m.name === e.target.value))} className="bg-transparent text-sm font-bold text-white mb-6 outline-none w-full">
                                                {library.substrate.map(m => <option key={m.name} value={m.name} className="bg-black">{m.name}</option>)}
                                            </select>
                                            <p className={`text-2xl font-black ${results?.s2Pass ? 'text-cyan-400' : 'text-red-500'}`}>{results?.s2Intensity} <span className="text-[10px] text-neutral-600">GW/cm²</span></p>
                                        </div>
                                    </div>

                                    <button onClick={handleSave} disabled={isSaving} className="w-full mt-10 bg-emerald-600 hover:bg-emerald-500 disabled:bg-neutral-800 py-5 rounded-2xl text-white font-black text-xs tracking-[0.3em] active:scale-[0.98] transition-all">
                                        {isSaving ? "SYNCING..." : ui.btn_save}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
