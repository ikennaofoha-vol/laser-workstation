<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Engineering Suite - V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-[#050505] text-gray-200 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmwMJGeNtKBUIP7PLfjgaFilA451LjLP2hUNCePT3eoSV7Rtxz1EifBFi7AtWaqFEeyw/exec";
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const OEMBuilder = ({ library, catConfig, initialQty }) => {
            const [buildA, setBuildA] = useState({});
            const [buildB, setBuildB] = useState({});
            const [qty, setQty] = useState(initialQty || 100);
            const [activeDetail, setActiveDetail] = useState(null);

            const categories = ["Laser Source", "Galvo Scanner", "F-Theta Lens", "Controller", "Enclosure"];

            const getPrice = (part, volume) => {
                if (!part) return 0;
                if (volume >= 500 && part.p500) return part.p500;
                if (volume >= 100 && part.pBulk) return part.pBulk;
                if (volume >= 100 && part.p100) return part.p100;
                return part.p1;
            };

            const calculateTotal = (build) => 
                Object.values(build).reduce((acc, p) => acc + getPrice(p, qty), 0);

            const BuildColumn = ({ title, build, setBuild, color }) => {
                const sourceWavelength = build["Laser Source"]?.wavelength || 0;

                return (
                    <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 space-y-4">
                        <h3 className={`text-sm font-black uppercase tracking-[0.3em] mb-6 ${color}`}>{title}</h3>
                        {categories.map(cat => {
                            // COMPATIBILITY FILTER: Match wavelength OR universal (0)
                            const filteredParts = library.filter(p => 
                                p.category === cat && 
                                (p.wavelength === 0 || sourceWavelength === 0 || p.wavelength === sourceWavelength)
                            );
                            
                            const selected = build[cat];
                            const labels = catConfig[cat] || { s1: "Spec 1", s2: "Spec 2", s3: "Spec 3" };

                            return (
                                <div key={cat} className="space-y-2">
                                    <label className="text-[9px] font-bold text-neutral-600 uppercase tracking-widest ml-1">{cat}</label>
                                    <div className="flex gap-2">
                                        <select 
                                            className="flex-1 bg-white/5 border border-white/10 rounded-xl p-2 text-xs font-bold outline-none focus:border-emerald-500 transition-all text-white"
                                            onChange={(e) => setBuild({...build, [cat]: filteredParts.find(p => p.model === e.target.value)})}
                                            value={selected?.model || ""}
                                        >
                                            <option value="">Select {cat}...</option>
                                            {filteredParts.map(p => (
                                                <option key={p.model} value={p.model} className="bg-neutral-900 italic">
                                                    {p.model} (${getPrice(p, qty)})
                                                </option>
                                            ))}
                                        </select>
                                        {selected && (
                                            <button onClick={() => setActiveDetail({...selected, labels})} className="p-2 bg-white/5 rounded-lg hover:bg-white/10 flex items-center justify-center">
                                                <Icon name="info" size={14} className="text-blue-400" />
                                            </button>
                                        )}
                                    </div>
                                    {selected && (
                                        <div className="px-2 flex justify-between items-center opacity-40">
                                            <span className="text-[9px] uppercase font-bold">{selected.mnf}</span>
                                            <span className="text-[9px] font-mono">{selected.spec1}</span>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                        <div className="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                            <span className="text-[10px] font-black uppercase tracking-widest text-neutral-500 italic">Total @ {qty}pcs</span>
                            <span className={`text-2xl font-black ${color}`}>${calculateTotal(build).toLocaleString()}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-8 animate-in slide-in-from-bottom duration-700">
                    <div className="flex justify-center items-center gap-4 bg-white/5 p-4 rounded-3xl border border-white/10 max-w-sm mx-auto">
                        <label className="text-[10px] font-black uppercase text-neutral-500">Target Volume</label>
                        <input 
                            type="number" 
                            value={qty} 
                            onChange={(e) => setQty(parseInt(e.target.value) || 1)} 
                            className="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-emerald-500 font-black text-center w-24 outline-none focus:border-emerald-500 transition-all"
                        />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <BuildColumn title="Config A" build={buildA} setBuild={setBuildA} color="text-emerald-500" />
                        <BuildColumn title="Config B" build={buildB} setBuild={setBuildB} color="text-cyan-500" />
                    </div>

                    {activeDetail && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 z-50" onClick={() => setActiveDetail(null)}>
                            <div className="bg-[#111] border border-white/10 rounded-[3rem] p-10 max-w-xl w-full shadow-2xl space-y-8" onClick={e => e.stopPropagation()}>
                                <header className="flex justify-between items-start">
                                    <div>
                                        <p className="text-emerald-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">{activeDetail.category}</p>
                                        <h2 className="text-3xl font-black text-white italic tracking-tighter uppercase leading-none">{activeDetail.model}</h2>
                                        <p className="text-neutral-500 text-sm mt-2">{activeDetail.mnf} — {activeDetail.supplier}</p>
                                    </div>
                                    <Icon name={activeDetail.icon} size={48} className="text-white opacity-10" />
                                </header>
                                
                                <div className="grid grid-cols-3 gap-6 py-8 border-y border-white/5">
                                    <div><p className="text-[9px] text-neutral-500 uppercase font-bold mb-1">{activeDetail.labels.s1}</p><p className="text-sm font-black text-white">{activeDetail.spec1}</p></div>
                                    <div><p className="text-[9px] text-neutral-500 uppercase font-bold mb-1">{activeDetail.labels.s2}</p><p className="text-sm font-black text-white">{activeDetail.spec2}</p></div>
                                    <div><p className="text-[9px] text-neutral-500 uppercase font-bold mb-1">{activeDetail.labels.s3}</p><p className="text-sm font-black text-white">{activeDetail.spec3}</p></div>
                                </div>

                                <div className="bg-white/5 p-6 rounded-3xl space-y-2 border border-white/5">
                                    <p className="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Pricing Waterfall</p>
                                    <div className="flex justify-between items-center py-2 border-b border-white/5 text-xs"><span>1-5 Units:</span><span className="font-bold font-mono">${activeDetail.p1}</span></div>
                                    <div className="flex justify-between items-center py-2 text-emerald-400 text-xs font-black italic underline"><span>Bulk Tier:</span><span>${getPrice(activeDetail, 100)}</span></div>
                                </div>

                                <div className="space-y-4 pt-4">
                                    <p className="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Manufacturer Notes</p>
                                    <p className="text-sm text-neutral-400 leading-relaxed italic">"{activeDetail.notes}"</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('simulator');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [data, setData] = useState({ uiConfig: {}, materials: [], laserSources: [], oemLibrary: [], catConfig: {} });
            
            const [params, setParams] = useState({
                name: "Custom Source", wavelength: 1064, avgPower: 20, freq: 30000, pulseWidth: 2, spotSize: 35, speed: 500, thickness: 0.5
            });
            const [s1Material, setS1Material] = useState(null);
            const [s2Material, setS2Material] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const res = await fetch(GOOGLE_SCRIPT_URL);
                        const d = await res.json();
                        setData(d);
                        const conductive = d.materials.filter(m => m.category === 'Conductive');
                        const substrate = d.materials.filter(m => m.category === 'Substrate');
                        if (conductive.length > 0) setS1Material(conductive[0]);
                        if (substrate.length > 0) setS2Material(substrate[0]);
                        setLoading(false);
                    } catch (e) { console.error(e); }
                };
                init();
            }, []);

            const results = useMemo(() => {
                if (!s1Material || !s2Material) return null;
                const safeFreq = params.freq || 1;
                const safePulse = params.pulseWidth || 1;
                const safeSpot = params.spotSize || 1;
                const pulseEnergy = params.avgPower / safeFreq;
                const peakPower = pulseEnergy / (safePulse * 1e-9);
                const area = Math.PI * Math.pow((safeSpot / 10000) / 2, 2);
                const rawIntensity = (peakPower / area) / 1e9;

                const getAbs = (mat) => {
                    if (params.wavelength <= 400) return mat.abs[355] || 0.1;
                    if (params.wavelength <= 650) return mat.abs[532] || 0.1;
                    return mat.abs[1064] || 0.1;
                };

                const s1Eff = rawIntensity * getAbs(s1Material);
                const s2Eff = rawIntensity * getAbs(s2Material);
                const s2Passes = s2Eff >= s2Material.threshold ? Math.ceil((params.thickness * 1000) / s2Material.depth) : Infinity;
                const overlap = (1 - ((params.speed / safeFreq) / (safeSpot / 1000))) * 100;

                let statusMsg = "READY";
                let statusColor = "text-emerald-500";
                if (s1Eff >= s1Material.threshold && s2Eff < s2Material.threshold) {
                    statusMsg = "ISO-MODE (Trace Safe)";
                    statusColor = "text-blue-400";
                } else if (s1Eff >= s1Material.threshold && s2Eff >= s2Material.threshold) {
                    statusMsg = "PENETRATION-MODE (Cutting)";
                    statusColor = "text-emerald-500 font-black";
                } else if (s1Eff < s1Material.threshold) {
                    statusMsg = "UNDERPOWERED";
                    statusColor = "text-red-500";
                }

                return { peakPower: (peakPower / 1000).toFixed(2), rawIntensity: rawIntensity.toFixed(3), s1Intensity: s1Eff.toFixed(3), s2Intensity: s2Eff.toFixed(3), s1Pass: s1Eff >= s1Material.threshold, s2Pass: s2Eff >= s2Material.threshold, s2Passes, overlap: overlap.toFixed(1), statusMsg, statusColor };
            }, [params, s1Material, s2Material]);

            const handleSave = async () => {
                setIsSaving(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...params, s1Material: s1Material.name, s1Intensity: results?.s1Intensity, s2Material: s2Material.name, s2Intensity: results?.s2Intensity, thickness: params.thickness, passes: results?.s2Passes === Infinity ? "FAIL" : results?.s2Passes, mode: "V3.0_Suite" })});
                    alert("Analysis Logged.");
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-black text-emerald-500 font-mono text-xs tracking-[0.5em] animate-pulse">SYNCHRONIZING CORE DATA...</div>;

            return (
                <div className="min-h-screen bg-[#050505] p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <nav className="flex justify-center mb-12">
                            <div className="bg-white/5 border border-white/10 p-1 rounded-2xl flex gap-2 shadow-2xl">
                                <button onClick={() => setPage('simulator')} className={`px-8 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${page === 'simulator' ? 'bg-emerald-600 text-white' : 'text-neutral-500 hover:text-white'}`}>Intensity Simulator</button>
                                <button onClick={() => setPage('builder')} className={`px-8 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${page === 'builder' ? 'bg-blue-600 text-white' : 'text-neutral-500 hover:text-white'}`}>OEM Builder</button>
                            </div>
                        </nav>

                        {page === 'simulator' ? (
                            <div className="animate-in fade-in duration-700">
                                <header className="flex justify-between items-center mb-10 pb-6 border-b border-white/5">
                                    <div>
                                        <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter">{data.uiConfig.main_title || 'Laser Station'}</h1>
                                        <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest mt-1">{data.uiConfig.main_subhead || 'Advanced Workstation'}</p>
                                    </div>
                                    <div className={`px-6 py-2 rounded-full border border-white/10 bg-white/5 text-[10px] font-black uppercase tracking-widest ${results?.statusColor}`}>{results?.statusMsg}</div>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-[#0f0f0f] border border-white/5 rounded-[2.5rem] p-8 shadow-2xl">
                                            <div className="flex justify-between items-center mb-8">
                                                <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Hardware Preset</h2>
                                                <select onChange={(e) => { const s = data.laserSources.find(x => x.name === e.target.value); if(s) setParams(prev => ({...prev, ...s, name: s.name})); }} className="bg-emerald-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full outline-none hover:bg-emerald-500 cursor-pointer">
                                                    <option value="">CUSTOM SOURCE</option>
                                                    {data.laserSources.map(s => <option key={s.name} value={s.name} className="bg-neutral-900">{s.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-4 text-white">
                                                <div className="bg-white/5 p-3 rounded-2xl border border-white/5"><label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Power (W)</label><input type="number" step="0.1" value={params.avgPower} onChange={e => setParams({...params, avgPower: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-black outline-none" /></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5"><label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Freq (Hz)</label><input type="number" value={params.freq} onChange={e => setParams({...params, freq: parseInt(e.target.value)})} className="bg-transparent w-full text-sm font-black outline-none" /></div>
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5"><label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Pulse (ns)</label><input type="number" value={params.pulseWidth} onChange={e => setParams({...params, pulseWidth: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-black outline-none" /></div>
                                                </div>
                                                <div className="bg-white/5 p-3 rounded-2xl border border-white/5"><label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Spot (µm)</label><input type="number" value={params.spotSize} onChange={e => setParams({...params, spotSize: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-black outline-none" /></div>
                                            </div>
                                        </div>
                                        <div className="bg-[#0f0f0f] border border-white/5 rounded-[2.5rem] p-8 shadow-2xl space-y-8">
                                            <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest italic underline">Process Dynamics</h2>
                                            <div className="space-y-6">
                                                <div className="space-y-2"><div className="flex justify-between font-black"><label className="text-[10px] text-neutral-500 uppercase">Scan Speed</label><span className="text-xs text-emerald-500">{params.speed} mm/s</span></div><input type="range" min="10" max="5000" step="10" value={params.speed} onChange={e => setParams({...params, speed: parseInt(e.target.value)})} className="w-full accent-emerald-500 cursor-pointer" /></div>
                                                <div className="space-y-2"><div className="flex justify-between font-black"><label className="text-[10px] text-neutral-500 uppercase">Thickness</label><span className="text-xs text-cyan-500">{params.thickness} mm</span></div><input type="range" min="0.01" max="5" step="0.01" value={params.thickness} onChange={e => setParams({...params, thickness: parseFloat(e.target.value)})} className="w-full accent-cyan-500 cursor-pointer" /></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-8 space-y-8 text-center md:text-left">
                                        <div className="bg-neutral-900/50 border border-white/5 rounded-[3rem] p-10 relative overflow-hidden group">
                                            <div className="absolute -right-20 -top-20 opacity-5 group-hover:rotate-12 transition-transform duration-1000"><Icon name="zap" size={400} /></div>
                                            <p className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.4em] mb-4">Effective Output Intensity</p>
                                            <div className="flex items-baseline gap-4 mb-10"><span className="text-[110px] font-black text-white leading-none tracking-tighter tabular-nums">{results?.rawIntensity}</span><span className="text-2xl text-neutral-700 italic font-bold">GW/cm²</span></div>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-10 border-t border-white/5 pt-10 font-black">
                                                <div><p className="text-[10px] text-neutral-500 uppercase mb-1">Peak Power</p><p className="text-2xl text-white tracking-tighter underline">{results?.peakPower} kW</p></div>
                                                <div><p className="text-[10px] text-neutral-500 uppercase mb-1">Pulse Overlap</p><p className={`text-2xl tracking-tighter ${results?.overlap < 10 || results?.overlap > 90 ? 'text-orange-500' : 'text-emerald-500'}`}>{results?.overlap}%</p></div>
                                                <div className="col-span-2 md:col-span-1 border-t md:border-t-0 border-white/5 pt-4 md:pt-0"><p className="text-[10px] text-neutral-500 uppercase mb-1">Pulse Energy</p><p className="text-xl text-white tracking-tighter">{((params.avgPower/params.freq)*1000000).toFixed(1)} µJ</p></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className={`p-8 rounded-[2.5rem] border-2 transition-all duration-500 ${results?.s1Pass ? 'bg-emerald-500/5 border-emerald-500/20 shadow-[0_0_50px_-12px_rgba(16,185,129,0.2)]' : 'bg-red-500/5 border-red-500/20'}`}>
                                                <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-6">Stage 1: Conductive Ablation</h3>
                                                <select value={s1Material?.name} onChange={e => setS1Material(data.materials.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2 cursor-pointer uppercase italic">
                                                    {data.materials.filter(m=>m.category==='Conductive').map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                                </select>
                                                <div className="flex justify-between items-baseline"><p className={`text-3xl font-black ${results?.s1Pass ? 'text-emerald-400' : 'text-red-500'}`}>{results?.s1Intensity}</p><p className="text-[9px] text-neutral-600 uppercase font-black tracking-widest italic opacity-50">GW/cm² Absorbed</p></div>
                                            </div>
                                            <div className={`p-8 rounded-[2.5rem] border-2 transition-all duration-500 ${results?.s2Pass ? 'bg-cyan-500/5 border-cyan-500/20 shadow-[0_0_50px_-12px_rgba(6,182,212,0.2)]' : 'bg-red-500/5 border-red-500/20'}`}>
                                                <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-6">Stage 2: Substrate Penetration</h3>
                                                <select value={s2Material?.name} onChange={e => setS2Material(data.materials.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2 cursor-pointer uppercase italic">
                                                    {data.materials.filter(m=>m.category==='Substrate').map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                                </select>
                                                <div className="flex justify-between items-center mb-4"><div><p className="text-[9px] text-neutral-500 font-black mb-1 uppercase tracking-widest opacity-60">Absorbed intensity</p><p className={`text-2xl font-black ${results?.s2Pass ? 'text-cyan-400' : 'text-red-500'}`}>{results?.s2Intensity}</p></div><p className="text-[9px] font-mono text-neutral-600 font-black bg-white/5 px-3 py-1 rounded-full">THR: {s2Material?.threshold}</p></div>
                                                <div className="pt-4 border-t border-white/5 flex justify-between items-center"><div><p className="text-[9px] text-neutral-500 font-black uppercase mb-1 opacity-60 italic underline">Required passes</p><p className="text-2xl font-black text-white">{results?.s2Passes === Infinity ? 'FAIL' : results?.s2Passes}</p></div><p className="text-[9px] text-neutral-600 font-black italic">{s2Material?.depth}µm/pass</p></div>
                                            </div>
                                        </div>

                                        <button onClick={handleSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-neutral-900 py-6 rounded-[2.5rem] text-white font-black text-[10px] uppercase tracking-[0.6em] transition-all shadow-2xl active:scale-95 flex items-center justify-center gap-4">
                                            {isSaving ? <Icon name="loader-2" size={16} className="animate-spin" /> : <Icon name="save" size={16} />}
                                            {isSaving ? "TRANSMITTING DATA TO CLAD_LOGS..." : data.uiConfig.btn_save || 'SYNCHRONIZE TO CLAD_LOGS'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <OEMBuilder 
                                library={data.oemLibrary} 
                                catConfig={data.catConfig} 
                                initialQty={parseInt(data.uiConfig.default_quote_qty) || 100}
                            />
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
