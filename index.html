<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Workstation - V2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-gray-200 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUnrzvMhU6r6vfNDCibs9_Cdhu1Y8vV7EBwfk8gdzQJi_xJWYVYdARlTQZD1JYHkt3qg/exec";

        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [ui, setUi] = useState({});
            const [library, setLibrary] = useState({ conductive: [], substrate: [], laserSources: [] });
            
            const [params, setParams] = useState({
                name: "New Test Run",
                wavelength: 1064,
                avgPower: 20,
                freq: 30000,
                pulseWidth: 2,
                spotSize: 35,
                speed: 500,
                thickness: 0.5
            });

            const [s1Material, setS1Material] = useState(null);
            const [s2Material, setS2Material] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL);
                        const data = await response.json();
                        
                        setUi(data.uiConfig || {});
                        
                        // Safety: Filter materials and ensure we have at least one
                        const mats = data.materials || [];
                        const conductive = mats.filter(m => m.category === 'Conductive');
                        const substrate = mats.filter(m => m.category === 'Substrate');
                        
                        setLibrary({ 
                            conductive, 
                            substrate, 
                            laserSources: data.laserSources || [] 
                        });

                        if (conductive.length > 0) setS1Material(conductive[0]);
                        if (substrate.length > 0) setS2Material(substrate[0]);
                        
                        setLoading(false);
                    } catch (err) { 
                        console.error("Initialization failed:", err);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            const results = useMemo(() => {
                if (!s1Material || !s2Material) return null;
                
                // Safety: Prevent division by zero
                const safeFreq = params.freq || 1;
                const safePulse = params.pulseWidth || 1;
                const safeSpot = params.spotSize || 1;
                const safeDepth = s2Material.depth || 1;

                // Intensity Calculations
                const pulseEnergy = params.avgPower / safeFreq;
                const peakPower = pulseEnergy / (safePulse * 1e-9);
                const area = Math.PI * Math.pow((safeSpot / 10000) / 2, 2);
                const rawIntensity = (peakPower / area) / 1e9;

                const getAbs = (mat) => {
                    if (params.wavelength <= 400) return mat.abs[355] || 0.1;
                    if (params.wavelength <= 650) return mat.abs[532] || 0.1;
                    return mat.abs[1064] || 0.1;
                };

                const s1Eff = rawIntensity * getAbs(s1Material);
                const s2Eff = rawIntensity * getAbs(s2Material);

                // Pass Estimation (Thickness / Material depth)
                const s2Passes = s2Eff >= s2Material.threshold 
                    ? Math.ceil((params.thickness * 1000) / safeDepth) 
                    : Infinity;

                // Overlap: (1 - (dist / spot))
                const overlap = (1 - ((params.speed / safeFreq) / (safeSpot / 1000))) * 100;

                return {
                    peakPower: (peakPower / 1000).toFixed(2),
                    rawIntensity: rawIntensity.toFixed(3),
                    s1Intensity: s1Eff.toFixed(3),
                    s2Intensity: s2Eff.toFixed(3),
                    s1Pass: s1Eff >= s1Material.threshold,
                    s2Pass: s2Eff >= s2Material.threshold,
                    s2Passes,
                    overlap: overlap.toFixed(1)
                };
            }, [params, s1Material, s2Material]);

            const handleSave = async () => {
                setIsSaving(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            ...params,
                            s1Material: s1Material.name,
                            s1Intensity: results.s1Intensity,
                            s2Material: s2Material.name,
                            s2Intensity: results.s2Intensity,
                            thickness: params.thickness,
                            passes: results.s2Passes === Infinity ? "FAIL" : results.s2Passes,
                            mode: "Advanced_Workstation"
                        })
                    });
                    alert("Test run recorded successfully!");
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-black text-emerald-500 font-mono text-xs tracking-[0.5em] animate-pulse">
                    INITIALIZING CORE...
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex justify-between items-center mb-10 pb-6 border-b border-white/5">
                            <div>
                                <h1 className="text-3xl font-black text-white tracking-tighter italic uppercase">{ui.main_title || 'Laser4You'}</h1>
                                <p className="text-neutral-500 text-[10px] font-bold tracking-widest uppercase mt-1">{ui.main_subhead || 'Workstation'}</p>
                            </div>
                            <div className="text-emerald-500 bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20 text-[10px] font-black uppercase tracking-widest">
                                Online
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            {/* Inputs */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Hardware Preset</h2>
                                        <select 
                                            onChange={(e) => {
                                                const s = library.laserSources.find(x => x.name === e.target.value);
                                                if(s) setParams(prev => ({...prev, ...s, name: s.name}));
                                            }}
                                            className="bg-emerald-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full outline-none hover:bg-emerald-500 cursor-pointer"
                                        >
                                            <option value="">CUSTOM SOURCE</option>
                                            {library.laserSources.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                            <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Source Name</label>
                                            <input type="text" value={params.name} onChange={e => setParams({...params, name: e.target.value})} className="bg-transparent w-full text-sm font-bold outline-none text-white" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Wave (nm)</label>
                                                <input type="number" value={params.wavelength} onChange={e => setParams({...params, wavelength: parseInt(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none text-white" />
                                            </div>
                                            <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Power (W)</label>
                                                <input type="number" step="0.1" value={params.avgPower} onChange={e => setParams({...params, avgPower: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none text-white" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Freq (Hz)</label>
                                                <input type="number" value={params.freq} onChange={e => setParams({...params, freq: parseInt(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none text-white" />
                                            </div>
                                            <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Pulse (ns)</label>
                                                <input type="number" value={params.pulseWidth} onChange={e => setParams({...params, pulseWidth: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none text-white" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 shadow-2xl space-y-8">
                                    <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Process Dynamics</h2>
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <div className="flex justify-between"><label className="text-[10px] font-bold text-neutral-500 uppercase">Scan Speed</label><span className="text-xs font-black text-emerald-500">{params.speed} mm/s</span></div>
                                            <input type="range" min="10" max="5000" step="10" value={params.speed} onChange={e => setParams({...params, speed: parseInt(e.target.value)})} className="w-full accent-emerald-500" />
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between"><label className="text-[10px] font-bold text-neutral-500 uppercase">Material Thickness</label><span className="text-xs font-black text-cyan-500">{params.thickness} mm</span></div>
                                            <input type="range" min="0.01" max="5" step="0.01" value={params.thickness} onChange={e => setParams({...params, thickness: parseFloat(e.target.value)})} className="w-full accent-cyan-500" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Outputs */}
                            <div className="lg:col-span-8 space-y-8">
                                <div className="bg-neutral-900/50 border border-white/5 rounded-[3rem] p-10 relative overflow-hidden">
                                    <p className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.3em] mb-4">Effective Output Intensity</p>
                                    <div className="flex items-baseline gap-4 mb-10">
                                        <span className="text-[120px] font-black text-white leading-none tracking-tighter tabular-nums">{results?.rawIntensity}</span>
                                        <span className="text-2xl text-neutral-700 italic font-bold">GW/cm²</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-10 border-t border-white/5 pt-10">
                                        <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Peak Power</p><p className="text-2xl font-black text-white">{results?.peakPower} kW</p></div>
                                        <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Pulse Overlap</p><p className={`text-2xl font-black ${results?.overlap < 20 || results?.overlap > 85 ? 'text-orange-500' : 'text-emerald-500'}`}>{results?.overlap}%</p></div>
                                        <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Status</p><p className="text-xs font-black text-emerald-500 uppercase tracking-widest pt-2">Calculating...</p></div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {/* Stage 1 */}
                                    <div className={`p-8 rounded-[2.5rem] border-2 transition-all ${results?.s1Pass ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                        <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-widest mb-6">Conductive Ablation</h3>
                                        <select value={s1Material?.name} onChange={e => setS1Material(library.conductive.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2">
                                            {library.conductive.map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                        </select>
                                        <p className={`text-3xl font-black ${results?.s1Pass ? 'text-emerald-400' : 'text-red-500'}`}>{results?.s1Intensity} <span className="text-xs opacity-50">GW/cm²</span></p>
                                    </div>

                                    {/* Stage 2 */}
                                    <div className={`p-8 rounded-[2.5rem] border-2 transition-all ${results?.s2Pass ? 'bg-cyan-500/5 border-cyan-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                        <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-widest mb-6">Substrate Penetration</h3>
                                        <select value={s2Material?.name} onChange={e => setS2Material(library.substrate.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2">
                                            {library.substrate.map(m => <option key={m.name} value={m.name} className="bg-neutral-900">{m.name}</option>)}
                                        </select>
                                        <div className="flex justify-between items-end">
                                            <div><p className="text-[10px] text-neutral-500 font-bold mb-1 uppercase tracking-widest">Req. Passes</p><p className={`text-4xl font-black ${results?.s2Pass ? 'text-cyan-400' : 'text-red-500'}`}>{results?.s2Passes === Infinity ? 'FAIL' : results?.s2Passes}</p></div>
                                            <p className="text-[10px] font-mono text-neutral-600 mb-1">Bit: {s2Material?.depth}µm/p</p>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={handleSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-neutral-900 py-6 rounded-[2.5rem] text-white font-black text-xs uppercase tracking-[0.5em] transition-all shadow-2xl active:scale-95">
                                    {isSaving ? "TRANSMITTING DATA..." : ui.btn_save || 'SYNC TO LOGS'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
