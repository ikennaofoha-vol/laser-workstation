<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser4You - Engineering & OEM Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Using lucide-react specifically for browser-based React -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-[#050505] text-gray-200 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWPaunxMuilH4d1iid5V-y6xKj0XkqG-QZTlB4HZTqzWWbglbtZr0Gtlaa0zf1xWkNRg/exec";

        const { useState, useEffect, useMemo } = React;

        // Simple Icon Component Helper to avoid library crashes
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- SUB-COMPONENT: OEM BUILDER PAGE ---
        const OEMBuilder = ({ data }) => {
            const categories = ["Laser Source", "Galvo Scanner", "F-Theta Lens", "Z-Column", "Controller", "Enclosure"];
            const [buildA, setBuildA] = useState({});
            const [buildB, setBuildB] = useState({});
            const [activeDetail, setActiveDetail] = useState(null);

            const calculateTotal = (build) => 
                Object.values(build).reduce((acc, part) => acc + (part?.price || 0), 0);

            const BuildColumn = ({ title, build, setBuild, color }) => (
                <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 space-y-4">
                    <h3 className={`text-sm font-black uppercase tracking-[0.3em] mb-6 ${color}`}>{title}</h3>
                    {categories.map(cat => {
                        const parts = data?.filter(p => p.category === cat) || [];
                        const selected = build[cat];
                        return (
                            <div key={cat} className="space-y-2">
                                <label className="text-[9px] font-bold text-neutral-600 uppercase tracking-widest ml-1">{cat}</label>
                                <div className="flex gap-2">
                                    <select 
                                        className="flex-1 bg-white/5 border border-white/10 rounded-xl p-2 text-xs font-bold outline-none focus:border-emerald-500 transition-all text-white"
                                        onChange={(e) => setBuild({...build, [cat]: parts.find(p => p.name === e.target.value)})}
                                        value={selected?.name || ""}
                                    >
                                        <option value="">Select {cat}...</option>
                                        {parts.map(p => <option key={p.name} value={p.name} className="bg-neutral-900">{p.name} (${p.price})</option>)}
                                    </select>
                                    {selected && (
                                        <button onClick={() => setActiveDetail(selected)} className="p-2 bg-white/5 rounded-lg hover:bg-white/10 transition-colors flex items-center justify-center">
                                            <Icon name="info" size={14} className="text-blue-400" />
                                        </button>
                                    )}
                                </div>
                                {selected && (
                                    <div className="px-2 flex justify-between items-center opacity-60">
                                        <span className="text-[10px] italic">{selected.mnf}</span>
                                        <span className="text-[10px] font-mono">{selected.spec}</span>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                    <div className={`mt-8 pt-6 border-t border-white/10 flex justify-between items-center`}>
                        <span className="text-[10px] font-black uppercase tracking-widest text-neutral-500">Estimated BOM Cost</span>
                        <span className={`text-2xl font-black ${color}`}>${calculateTotal(build)}</span>
                    </div>
                </div>
            );

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 relative pb-20">
                    <BuildColumn title="Configuration Alpha" build={buildA} setBuild={setBuildA} color="text-emerald-500" />
                    <BuildColumn title="Configuration Beta" build={buildB} setBuild={setBuildB} color="text-cyan-500" />

                    {activeDetail && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50 shadow-2xl" onClick={() => setActiveDetail(null)}>
                            <div className="bg-[#151515] border border-white/10 rounded-3xl p-8 max-w-lg w-full shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <p className="text-emerald-500 text-[10px] font-black uppercase tracking-widest mb-1">{activeDetail.category}</p>
                                        <h2 className="text-2xl font-black text-white leading-tight">{activeDetail.name}</h2>
                                    </div>
                                    <button onClick={() => setActiveDetail(null)} className="text-neutral-500 hover:text-white transition-colors">
                                        <Icon name="maximize-2" size={20} />
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/5"><p className="text-[10px] text-neutral-500 uppercase font-bold mb-1">Standard Price</p><p className="text-xl font-black text-white">${activeDetail.price}</p></div>
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/5"><p className="text-[10px] text-neutral-500 uppercase font-bold mb-1">Tiered ({activeDetail.t1Qty}+)</p><p className="text-xl font-black text-blue-400">${activeDetail.t1Price}</p></div>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-neutral-500 uppercase tracking-widest border-b border-white/5 pb-2">Technical & OEM Notes</p>
                                    <p className="text-sm text-neutral-300 leading-relaxed italic">"{activeDetail.notes}"</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APPLICATION CONTAINER ---
        const App = () => {
            const [page, setPage] = useState('simulator');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [ui, setUi] = useState({});
            const [library, setLibrary] = useState({ conductive: [], substrate: [], laserSources: [], oemLibrary: [] });
            
            const [params, setParams] = useState({
                name: "Custom Source",
                wavelength: 1064,
                avgPower: 20,
                freq: 30000,
                pulseWidth: 2,
                spotSize: 35,
                speed: 500,
                thickness: 0.5
            });
            const [s1Material, setS1Material] = useState(null);
            const [s2Material, setS2Material] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL);
                        const data = await response.json();
                        setUi(data.uiConfig || {});
                        const mats = data.materials || [];
                        const conductive = mats.filter(m => m.category === 'Conductive');
                        const substrate = mats.filter(m => m.category === 'Substrate');
                        setLibrary({ 
                            conductive, 
                            substrate, 
                            laserSources: data.laserSources || [], 
                            oemLibrary: data.oemLibrary || [] 
                        });
                        if (conductive.length > 0) setS1Material(conductive[0]);
                        if (substrate.length > 0) setS2Material(substrate[0]);
                        setLoading(false);
                    } catch (err) { 
                        console.error("Initialization failed:", err);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            const results = useMemo(() => {
                if (!s1Material || !s2Material) return null;
                const safeFreq = params.freq || 1;
                const safePulse = params.pulseWidth || 1;
                const safeSpot = params.spotSize || 1;
                const safeDepth = s2Material.depth || 1;

                const pulseEnergy = params.avgPower / safeFreq;
                const peakPower = pulseEnergy / (safePulse * 1e-9);
                const area = Math.PI * Math.pow((safeSpot / 10000) / 2, 2);
                const rawIntensity = (peakPower / area) / 1e9;

                const getAbs = (mat) => {
                    if (params.wavelength <= 400) return mat.abs[355] || 0.1;
                    if (params.wavelength <= 650) return mat.abs[532] || 0.1;
                    return mat.abs[1064] || 0.1;
                };

                const s1Eff = rawIntensity * getAbs(s1Material);
                const s2Eff = rawIntensity * getAbs(s2Material);

                const s2Passes = s2Eff >= s2Material.threshold 
                    ? Math.ceil((params.thickness * 1000) / safeDepth) 
                    : Infinity;

                const overlap = (1 - ((params.speed / safeFreq) / (safeSpot / 1000))) * 100;

                let statusMsg = "READY";
                let statusColor = "text-emerald-500";
                
                if (s1Eff >= s1Material.threshold && s2Eff < s2Material.threshold) {
                    statusMsg = "ISO-MODE (Safe for PCB Traces)";
                    statusColor = "text-blue-400";
                } else if (s1Eff >= s1Material.threshold && s2Eff >= s2Material.threshold) {
                    statusMsg = "PENETRATION-MODE (Cut Through)";
                    statusColor = "text-emerald-500 font-black";
                } else if (s1Eff < s1Material.threshold) {
                    statusMsg = "UNDERPOWERED (Marking Only)";
                    statusColor = "text-red-500";
                }
                
                if (overlap < 0) {
                    statusMsg = "GAPPING DETECTED (Move Slower)";
                    statusColor = "text-orange-500 animate-pulse";
                }

                return {
                    peakPower: (peakPower / 1000).toFixed(2),
                    rawIntensity: rawIntensity.toFixed(3),
                    s1Intensity: s1Eff.toFixed(3),
                    s2Intensity: s2Eff.toFixed(3),
                    s1Pass: s1Eff >= s1Material.threshold,
                    s2Pass: s2Eff >= s2Material.threshold,
                    s2Passes,
                    overlap: overlap.toFixed(1),
                    statusMsg,
                    statusColor
                };
            }, [params, s1Material, s2Material]);

            const handleSave = async () => {
                setIsSaving(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            ...params,
                            s1Material: s1Material.name,
                            s1Intensity: results?.s1Intensity,
                            s2Material: s2Material.name,
                            s2Intensity: results?.s2Intensity,
                            thickness: params.thickness,
                            passes: results?.s2Passes === Infinity ? "FAIL" : results?.s2Passes,
                            mode: "Combined_Suite"
                        })
                    });
                    alert("Analysis Logged.");
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-black text-emerald-500 font-mono text-xs tracking-[0.5em] animate-pulse">
                    SYNCHRONIZING CORE DATA...
                </div>
            );

            return (
                <div className="min-h-screen bg-[#050505] p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        
                        {/* NAVIGATION MENU */}
                        <nav className="flex justify-center mb-12">
                            <div className="bg-white/5 border border-white/10 p-1 rounded-2xl flex gap-2">
                                <button onClick={() => setPage('simulator')} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${page === 'simulator' ? 'bg-emerald-600 text-white shadow-lg' : 'text-neutral-500 hover:text-white'}`}>
                                    Intensity Simulator
                                </button>
                                <button onClick={() => setPage('builder')} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${page === 'builder' ? 'bg-blue-600 text-white shadow-lg' : 'text-neutral-500 hover:text-white'}`}>
                                    OEM Builder
                                </button>
                            </div>
                        </nav>

                        {/* PAGE SWITCHING LOGIC */}
                        {page === 'simulator' ? (
                            <div className="animate-in fade-in duration-700">
                                <header className="flex flex-col md:flex-row justify-between items-center mb-10 pb-6 border-b border-white/5 gap-4 text-center md:text-left">
                                    <div>
                                        <h1 className="text-4xl font-black text-white tracking-tighter italic uppercase">{ui.main_title || 'Laser Engineering'}</h1>
                                        <p className="text-neutral-500 text-[10px] font-bold tracking-widest uppercase mt-1">{ui.main_subhead || 'Workstation'}</p>
                                    </div>
                                    <div className={`px-6 py-2 rounded-full border border-white/10 bg-white/5 text-[10px] font-black uppercase tracking-widest ${results?.statusColor || 'text-neutral-500'}`}>
                                        {results?.statusMsg || 'CALCULATING...'}
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 shadow-2xl">
                                            <div className="flex justify-between items-center mb-8">
                                                <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Hardware Preset</h2>
                                                <select 
                                                    onChange={(e) => {
                                                        const s = library.laserSources.find(x => x.name === e.target.value);
                                                        if(s) setParams(prev => ({...prev, ...s, name: s.name}));
                                                    }}
                                                    className="bg-emerald-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full outline-none hover:bg-emerald-500 cursor-pointer"
                                                >
                                                    <option value="">CUSTOM SOURCE</option>
                                                    {library.laserSources.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-4 text-white">
                                                <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                    <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Source Name</label>
                                                    <input type="text" value={params.name} onChange={e => setParams({...params, name: e.target.value})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                        <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Wave (nm)</label>
                                                        <input type="number" value={params.wavelength} onChange={e => setParams({...params, wavelength: parseInt(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                    </div>
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                        <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Power (W)</label>
                                                        <input type="number" step="0.1" value={params.avgPower} onChange={e => setParams({...params, avgPower: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                        <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Freq (Hz)</label>
                                                        <input type="number" value={params.freq} onChange={e => setParams({...params, freq: parseInt(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                    </div>
                                                    <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                        <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Pulse (ns)</label>
                                                        <input type="number" value={params.pulseWidth} onChange={e => setParams({...params, pulseWidth: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                    </div>
                                                </div>
                                                <div className="bg-white/5 p-3 rounded-2xl border border-white/5">
                                                    <label className="block text-[10px] text-neutral-500 uppercase font-bold mb-1">Spot Size (µm)</label>
                                                    <input type="number" value={params.spotSize} onChange={e => setParams({...params, spotSize: parseFloat(e.target.value)})} className="bg-transparent w-full text-sm font-bold outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-[#0f0f0f] border border-white/5 rounded-[2rem] p-6 shadow-2xl space-y-8">
                                            <h2 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Process Dynamics</h2>
                                            <div className="space-y-6">
                                                <div className="space-y-2">
                                                    <div className="flex justify-between"><label className="text-[10px] font-bold text-neutral-500 uppercase">Scan Speed</label><span className="text-xs font-black text-emerald-500">{params.speed} mm/s</span></div>
                                                    <input type="range" min="10" max="5000" step="10" value={params.speed} onChange={e => setParams({...params, speed: parseInt(e.target.value)})} className="w-full accent-emerald-500 cursor-pointer" />
                                                </div>
                                                <div className="space-y-2">
                                                    <div className="flex justify-between"><label className="text-[10px] font-bold text-neutral-500 uppercase">Thickness</label><span className="text-xs font-black text-cyan-500">{params.thickness} mm</span></div>
                                                    <input type="range" min="0.01" max="5" step="0.01" value={params.thickness} onChange={e => setParams({...params, thickness: parseFloat(e.target.value)})} className="w-full accent-cyan-500 cursor-pointer" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-8 space-y-8">
                                        <div className="bg-neutral-900/50 border border-white/5 rounded-[3rem] p-10 relative overflow-hidden group">
                                            <div className="absolute -right-20 -top-20 opacity-5 group-hover:rotate-12 transition-transform duration-1000">
                                                <Icon name="zap" size={400} />
                                            </div>
                                            <p className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.3em] mb-4">Effective Output Intensity</p>
                                            <div className="flex items-baseline gap-4 mb-10">
                                                <span className="text-[110px] font-black text-white leading-none tracking-tighter tabular-nums">{results?.rawIntensity || '0.000'}</span>
                                                <span className="text-2xl text-neutral-700 italic font-bold">GW/cm²</span>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-10 border-t border-white/5 pt-10 text-center md:text-left">
                                                <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Peak Power</p><p className="text-2xl font-black text-white">{results?.peakPower || '0.00'} kW</p></div>
                                                <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Pulse Overlap</p><p className={`text-2xl font-black ${(results?.overlap < 10 || results?.overlap > 90) ? 'text-orange-500' : 'text-emerald-500'}`}>{results?.overlap || '0.0'}%</p></div>
                                                <div className="col-span-2 md:col-span-1 border-t md:border-t-0 border-white/5 pt-4 md:pt-0"><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Pulse Energy</p><p className="text-xl font-black text-white">{((params.avgPower/params.freq)*1000000).toFixed(1)} µJ</p></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className={`p-8 rounded-[2.5rem] border-2 transition-all duration-500 ${results?.s1Pass ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                                <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-widest mb-6">Stage 1: Conductive Ablation</h3>
                                                <select value={s1Material?.name} onChange={e => setS1Material(library.conductive.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2 cursor-pointer">
                                                    {library.conductive.map(m => <option key={m.name} value={m.name} className="bg-neutral-900 font-sans">{m.name}</option>)}
                                                </select>
                                                <div className="flex justify-between items-baseline">
                                                    <p className={`text-3xl font-black ${results?.s1Pass ? 'text-emerald-400' : 'text-red-500'}`}>{results?.s1Intensity || '0.000'}</p>
                                                    <p className="text-[10px] text-neutral-600 uppercase font-bold">Absorbed GW/cm²</p>
                                                </div>
                                            </div>
                                            <div className={`p-8 rounded-[2.5rem] border-2 transition-all duration-500 ${results?.s2Pass ? 'bg-cyan-500/5 border-cyan-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                                <h3 className="text-[10px] font-black text-neutral-400 uppercase tracking-widest mb-6">Stage 2: Substrate Penetration</h3>
                                                <select value={s2Material?.name} onChange={e => setS2Material(library.substrate.find(m => m.name === e.target.value))} className="bg-transparent text-xl font-black text-white outline-none w-full mb-2 cursor-pointer">
                                                    {library.substrate.map(m => <option key={m.name} value={m.name} className="bg-neutral-900 font-sans">{m.name}</option>)}
                                                </select>
                                                <div className="flex justify-between items-end mb-4">
                                                    <div><p className="text-[10px] text-neutral-500 font-bold mb-1 uppercase tracking-widest">Absorbed Intensity</p><p className={`text-2xl font-black ${results?.s2Pass ? 'text-cyan-400' : 'text-red-500'}`}>{results?.s2Intensity || '0.000'}</p></div>
                                                    <p className="text-[10px] font-mono text-neutral-600 mb-1">Thr: {s2Material?.threshold}</p>
                                                </div>
                                                <div className="pt-4 border-t border-white/5 flex justify-between items-center">
                                                    <div><p className="text-[10px] text-neutral-500 font-bold uppercase mb-1">Req. Passes</p><p className="text-2xl font-black text-white">{results?.s2Passes === Infinity ? 'FAIL' : (results?.s2Passes || '0')}</p></div>
                                                    <p className="text-[10px] text-neutral-600 font-bold italic">{s2Material?.depth}µm/pass</p>
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={handleSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-neutral-900 py-6 rounded-[2.5rem] text-white font-black text-[10px] uppercase tracking-[0.5em] transition-all shadow-2xl active:scale-95 disabled:cursor-not-allowed">
                                            {isSaving ? <Icon name="activity" size={14} className="animate-spin inline mr-2" /> : <Icon name="save" size={14} className="inline mr-2" />}
                                            {isSaving ? "TRANSMITTING TO LOGS..." : ui.btn_save || 'SYNC TO CLAD_LOGS'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in slide-in-from-bottom duration-700">
                                <header className="text-center mb-10">
                                    <h2 className="text-3xl font-black text-white uppercase italic tracking-tighter">System Configurator</h2>
                                    <p className="text-[10px] text-neutral-500 font-bold tracking-[0.3em] uppercase mt-2">Quote Analyzer & Build Comparison</p>
                                </header>
                                <OEMBuilder data={library.oemLibrary} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
